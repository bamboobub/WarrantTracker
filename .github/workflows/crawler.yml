name: Daily Warrant Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 執行 (UTC 時間 09:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

env:
  # 提前切換至 Node 24 以消除棄用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 移除了 cache: 'pip' 以避免缺少 requirements.txt 的錯誤

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install shioaji sqlalchemy psycopg2-binary pandas fake-useragent requests

      - name: 執行真實資料爬蟲
        env:
          DB_URL: ${{ secrets.DB_URL }}
          SHIOAJI_API_KEY: ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: |
          python backend/real_data_crawler.py